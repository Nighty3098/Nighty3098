name: Update README with Activity

on:
  schedule:
    - cron: '0 */2 * * *' # Запускается каждые 6 часов
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update README with recent activity
        uses: athul/gh-workflow@v1.0.0
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_LINES: 5
          COMMIT_MSG: "🤖 Auto-update: Added recent activity"
