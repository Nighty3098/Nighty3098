name: Update README

on:
  schedule:
    - cron: '0 */3 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update this repos README with recent activity

    steps:
      - uses: actions/checkout@v3
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
